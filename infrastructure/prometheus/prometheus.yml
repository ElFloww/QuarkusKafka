# =============================================================================
# Configuration Prometheus – Tuuuur Merch Shop
# =============================================================================
# Scrape les métriques exposées par les services Quarkus (Micrometer/OpenMetrics)
# et les métriques JVM Kafka.
# =============================================================================

global:
  scrape_interval: 15s # Fréquence de collecte par défaut
  evaluation_interval: 15s # Fréquence d'évaluation des règles d'alerte
  scrape_timeout: 10s

# ---------------------------------------------------------------------------
# ALERTMANAGER  (optionnel – à configurer si on veut des alertes)
# ---------------------------------------------------------------------------
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# ---------------------------------------------------------------------------
# JOBS DE SCRAPE
# ---------------------------------------------------------------------------
scrape_configs:
  # -- Prometheus lui-même ---------------------------------------------------
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # -- TUUUUR QUARKUS SERVICE (port 8080) ------------------------------------
  # Service unique exécuté sur le host
  # Expose métriques sur /q/metrics (Micrometer + Prometheus)
  - job_name: "tuuuur-service"
    metrics_path: "/q/metrics"
    scrape_interval: 15s
    scrape_timeout: 5s
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          application: "tuuuur-merch"
          service_type: "quarkus"
          env: "dev"

  # -- KAFKA BROKER JMX EXPORTERS --------------------------------------------
  - job_name: "kafka-broker-1"
    static_configs:
      - targets: ["jmx-exporter-1:5556"]

  - job_name: "kafka-broker-2"
    static_configs:
      - targets: ["jmx-exporter-2:5557"]

  - job_name: "kafka-broker-3"
    static_configs:
      - targets: ["jmx-exporter-3:5558"]

  # -- KAFKA EXPORTER (consumer groups, topics, lag) -------------------------
  - job_name: "kafka-exporter"
    static_configs:
      - targets: ["kafka-exporter:9308"]
