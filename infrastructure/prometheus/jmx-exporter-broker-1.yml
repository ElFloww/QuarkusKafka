# JMX exporter config for Kafka broker 1
hostPort: kafka-broker-1:9101
lowercaseOutputName: true
lowercaseOutputLabelNames: true

whitelistObjectNames:
  - "kafka.server:type=BrokerTopicMetrics,name=*"
  - "kafka.server:type=BrokerTopicMetrics,clientId=*,name=*"
  - "kafka.server:type=BrokerTopicMetrics,clientId=*,name=BytesInPerSec"
  - "kafka.server:type=BrokerTopicMetrics,clientId=*,name=BytesOutPerSec"
  - "kafka.server:type=BrokerTopicMetrics,clientId=*,name=MessagesInPerSec"
  - "kafka.server:type=BrokerTopicMetrics,clientId=*,name=ProduceLocalTimeMsMean"
  - "kafka.server:type=BrokerTopicMetrics,clientId=*,name=FetchConsumerTotalTimeMs"
  - "kafka.server:type=DelayedFetchMetrics,name=*,clientSide=consumer"
  - "kafka.server:type=DelayedFetchMetrics,name=*,clientSide=follower"
  - "kafka.server:type=ReplicaManager,name=*"
  - "kafka.server:type=ReplicaManager,name=LeaderCount"
  - "kafka.server:type=ReplicaManager,name=PartitionCount"
  - "kafka.server:type=ReplicaManager,name=UnderReplicatedPartitions"
  - "kafka.server:type=ReplicaManager,name=IsrExpandsPerSec"
  - "kafka.server:type=ReplicaManager,name=IsrShrinksPerSec"
  - "kafka.network:type=RequestMetrics,name=*,clientSide=*,apiName=*"
  - "kafka.network:type=RequestMetrics,name=TotalTimeMs,request=*"
  - "kafka.network:type=RequestMetrics,name=RequestsPerSec,request=*"
  - "kafka.network:type=SocketServer,name=*"
  - "kafka.network:type=RequestMetrics,name=*"
  - "kafka.consumer:type=consumer-coordinator-metrics,client-id=*"
  - "kafka.consumer:type=consumer-fetch-manager-metrics,client-id=*,topic=*,partition=*"
  - "kafka.controller:type=KafkaController,name=*"
  - "kafka.controller:type=KafkaController,name=ActiveControllerCount"
  - "kafka.controller:type=KafkaController,name=OfflinePartitionsCount"
  - "kafka.controller:type=KafkaController,name=PreferredReplicaImbalanceCount"
  - "kafka.log:type=Log,name=*,topic=*,partition=*"
  - "kafka.log:type=LogCleaner,name=*"
  - "kafka.log:type=LogCleanerManager,name=*"
  - "java.lang:type=Runtime"
  - "java.lang:type=Memory"
  - "java.lang:type=MemoryPool,name=*"
  - "java.lang:type=GarbageCollector,name=*"
  - "java.lang:type=Threading"
  - "java.lang:type=OperatingSystem"
