# ==============================================================================
# application.properties – Tuuuur Merch Shop
# ==============================================================================

# ------------------------------------------------------------------------------
# APPLICATION
# ------------------------------------------------------------------------------
quarkus.application.name=tuuuur-merch
quarkus.http.port=8080

# Force SmallRye Messaging startup (nécessaire pour @Incoming/consumers)

# ------------------------------------------------------------------------------
# KAFKA – DevServices DÉSACTIVÉ : on utilise le broker du docker-compose
# Cluster de 3 brokers Kafka en réplication (via infrastructure/docker-compose.yml)
# localhost:9092 (broker-1), localhost:9093 (broker-2), localhost:9094 (broker-3)
# ------------------------------------------------------------------------------
quarkus.kafka.devservices.enabled=false
kafka.bootstrap.servers=localhost:9092,localhost:9093,localhost:9094

# ------------------------------------------------------------------------------
# KAFKA STREAMS – Bootstrap servers
# ------------------------------------------------------------------------------
kafka-streams.bootstrap-servers=localhost:9092,localhost:9093,localhost:9094
kafka-streams.application-id=tuuuur-analytics-streams
# Topics dont le runtime doit attendre l'existence avant de démarrer la topologie
quarkus.kafka-streams.topics=payment-events

# ------------------------------------------------------------------------------
# SMALLRYE REACTIVE MESSAGING – Définition des channels Kafka
#
# Nomenclature des topics :
#   orders-events    → OrderCreated
#   rank-events      → RankVerified
#   stock-events     → StockReserved
#   payment-events   → PaymentSucceeded / PaymentFailed
#   analytics-stats  → Résultats Kafka Streams
# ------------------------------------------------------------------------------

# ── ORDER SERVICE ──────────────────────────────────────────────────────────────
# Outgoing : le OrderService produit OrderCreated → orders-events
mp.messaging.outgoing.orders-out.connector=smallrye-kafka
mp.messaging.outgoing.orders-out.topic=orders-events
mp.messaging.outgoing.orders-out.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

# Incoming : le OrderService consomme PaymentSucceeded ← payment-events
mp.messaging.incoming.payment-in.connector=smallrye-kafka
mp.messaging.incoming.payment-in.topic=payment-events
mp.messaging.incoming.payment-in.group.id=order-service-payment-grp
mp.messaging.incoming.payment-in.value.deserializer=upjv.insset.shared.model.PaymentEventDeserializer
mp.messaging.incoming.payment-in.auto.offset.reset=earliest

# ── GAMESYNC SERVICE ──────────────────────────────────────────────────────────
# Incoming : consomme OrderCreated ← orders-events
mp.messaging.incoming.orders-in.connector=smallrye-kafka
mp.messaging.incoming.orders-in.topic=orders-events
mp.messaging.incoming.orders-in.group.id=gamesync-service-grp
mp.messaging.incoming.orders-in.value.deserializer=upjv.insset.shared.model.OrderEventDeserializer
mp.messaging.incoming.orders-in.auto.offset.reset=earliest

# Outgoing : produit RankVerified → rank-events
mp.messaging.outgoing.rank-out.connector=smallrye-kafka
mp.messaging.outgoing.rank-out.topic=rank-events
mp.messaging.outgoing.rank-out.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

# ── STOCK SERVICE ─────────────────────────────────────────────────────────────
# Incoming : consomme RankVerified ← rank-events
mp.messaging.incoming.rank-in.connector=smallrye-kafka
mp.messaging.incoming.rank-in.topic=rank-events
mp.messaging.incoming.rank-in.group.id=stock-service-grp
mp.messaging.incoming.rank-in.value.deserializer=upjv.insset.shared.model.RankEventDeserializer
mp.messaging.incoming.rank-in.auto.offset.reset=earliest

# Outgoing : produit StockReserved → stock-events
mp.messaging.outgoing.stock-out.connector=smallrye-kafka
mp.messaging.outgoing.stock-out.topic=stock-events
mp.messaging.outgoing.stock-out.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

# ── PAYMENT SERVICE ───────────────────────────────────────────────────────────
# Incoming : consomme StockReserved ← stock-events
mp.messaging.incoming.stock-in.connector=smallrye-kafka
mp.messaging.incoming.stock-in.topic=stock-events
mp.messaging.incoming.stock-in.group.id=payment-service-grp
mp.messaging.incoming.stock-in.value.deserializer=upjv.insset.shared.model.StockEventDeserializer
mp.messaging.incoming.stock-in.auto.offset.reset=earliest

# Outgoing : produit PaymentSucceeded → payment-events
mp.messaging.outgoing.payment-out.connector=smallrye-kafka
mp.messaging.outgoing.payment-out.topic=payment-events
mp.messaging.outgoing.payment-out.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

# ── ORDER SERVICE – Observateurs des étapes intermédiaires de la Saga ────────
# Ces consumers ont des group.id DIFFÉRENTS de GameSync et Stock :
# ils consomment les mêmes topics en parallèle (concept de Consumer Group).

# Observer rank-events (pour mettre à jour statut RANK_VERIFIED / RANK_REJECTED)
mp.messaging.incoming.rank-observer-in.connector=smallrye-kafka
mp.messaging.incoming.rank-observer-in.topic=rank-events
mp.messaging.incoming.rank-observer-in.group.id=order-service-rank-observer
mp.messaging.incoming.rank-observer-in.value.deserializer=upjv.insset.shared.model.RankEventDeserializer
mp.messaging.incoming.rank-observer-in.auto.offset.reset=earliest

# Observer stock-events (pour mettre à jour statut STOCK_RESERVED)
mp.messaging.incoming.stock-observer-in.connector=smallrye-kafka
mp.messaging.incoming.stock-observer-in.topic=stock-events
mp.messaging.incoming.stock-observer-in.group.id=order-service-stock-observer
mp.messaging.incoming.stock-observer-in.value.deserializer=upjv.insset.shared.model.StockEventDeserializer
mp.messaging.incoming.stock-observer-in.auto.offset.reset=earliest

# ── ADVANCED CONSUMER GROUP – Gestion explicite des partitions ────────────────
# Démontre un Consumer Group avec configuration avancée des partitions
# Ce consumer consomme orders-events avec un groupe dédié
# et peut être scalé horizontalement (plusieurs instances = plusieurs partitions)
mp.messaging.incoming.orders-partitioned-in.connector=smallrye-kafka
mp.messaging.incoming.orders-partitioned-in.topic=orders-events
mp.messaging.incoming.orders-partitioned-in.group.id=orders-partition-processor-grp
mp.messaging.incoming.orders-partitioned-in.value.deserializer=upjv.insset.shared.model.OrderEventDeserializer
mp.messaging.incoming.orders-partitioned-in.auto.offset.reset=earliest

# Configuration des partitions :
# - max.poll.records : nombre MAX de messages traités par batch
# - session.timeout.ms : temps avant que le consumer soit considéré comme mort
# - heartbeat.interval.ms : fréquence des "battements de cœur" au broker
mp.messaging.incoming.orders-partitioned-in.max.poll.records=100
mp.messaging.incoming.orders-partitioned-in.session.timeout.ms=30000
mp.messaging.incoming.orders-partitioned-in.heartbeat.interval.ms=10000

# Rebalance Listener – Montage des hooks pour tracer les rebalances
mp.messaging.incoming.orders-partitioned-in.consumer-rebalance-listener.enabled=true

# ── ANALYTICS SERVICE (Kafka Streams – topic source & sink) ──────────────────
# Le topic source (payment-events) est lu directement par la Topology.
# Le topic sink (analytics-stats) est écrit par la Topology.
# Les channels SmallRye ci-dessous ne sont PAS utilisés par Streams :
# Kafka Streams gère ses propres consumers/producers en interne.

# ------------------------------------------------------------------------------
# KAFKA STREAMS – Configuration avancée
# ------------------------------------------------------------------------------
# (application-id et bootstrap-servers définis en haut du fichier)

# Nombre de threads de traitement Streams (1 suffit pour la démo)
kafka-streams.num.stream.threads=1

# Politique de reset des offsets au premier démarrage
kafka-streams.auto.offset.reset=earliest

# Commit interval en millisecondes (fréquence d'écriture des offsets)
kafka-streams.commit.interval.ms=1000

# Répertoire de stockage des State Stores RocksDB (données persistées entre restarts)
# En %dev, on utilise un répertoire temporaire pour rester stateless
%dev.kafka-streams.state.dir=/tmp/tuuuur-kafka-streams
%prod.kafka-streams.state.dir=/var/lib/tuuuur/kafka-streams

# Cache mémoire pour les agrégations (améliore les performances)
kafka-streams.cache.max.bytes.buffering=10485760

# Sérialisation par défaut pour Kafka Streams
kafka-streams.default.key.serde=org.apache.kafka.common.serialization.Serdes$StringSerde
kafka-streams.default.value.serde=org.apache.kafka.common.serialization.Serdes$StringSerde

# Tolérance aux pannes
kafka-streams.acceptable.recovery.lag=10000

# ------------------------------------------------------------------------------
# KAFKA – Gestion des erreurs de désérialisation
# Permet de traiter gracieusement les messages mal formatés sans bloquer le consumer
# ------------------------------------------------------------------------------
# Configuration SmallRye Reactive Messaging pour skip les messages avec erreur de désérialisation
# Channel payment-in (PaymentSucceededEvent)
mp.messaging.incoming.payment-in.failure-strategy=ignore

# Channel rank-in (RankVerifiedEvent)
mp.messaging.incoming.rank-in.failure-strategy=ignore

# Channel stock-in (StockReservedEvent)
mp.messaging.incoming.stock-in.failure-strategy=ignore

# Channel orders-partitioned-in (OrderCreatedEvent - with partition strategy)
mp.messaging.incoming.orders-partitioned-in.failure-strategy=ignore

# Global failure handler pour tous les consumers avec erreur de désérialisation
quarkus.kafka.failure-strategy=ignore

# Permets de continuer à consommer même quand un message ne peut pas être désérialisé
smallrye.messaging.kafka.continue-on-deserialization-failure=true

# ------------------------------------------------------------------------------
# OBSERVABILITÉ – Micrometer / Prometheus
# Exposé sur GET /q/metrics  (scraped par Prometheus)
# ------------------------------------------------------------------------------
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics
# Tags communs ajoutés à toutes les métriques
quarkus.micrometer.binder.kafka.enabled=true
quarkus.micrometer.binder.jvm=true
quarkus.micrometer.binder.system=true

# ------------------------------------------------------------------------------
# LOGGING
# ------------------------------------------------------------------------------
quarkus.log.console.enable=true
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.level=INFO
quarkus.log.category."upjv.insset".level=DEBUG
quarkus.log.category."io.smallrye.reactive.messaging".level=DEBUG
quarkus.log.category."io.quarkus.kafka.client".level=DEBUG

# ------------------------------------------------------------------------------
# DEV UI  (accessible sur /q/dev en mode dev)
# ------------------------------------------------------------------------------
quarkus.dev-ui.cors.enabled=true
